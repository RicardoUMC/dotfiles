general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    color = rgba(171D23ff)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(ffffffff)
    font_size = 72
    font_family = SF Pro Display
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
    color = rgba(ffffff66)
    font_size = 18
    font_family = SF Pro Text
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 48
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgba(539AFCaa)
    inner_color = rgba(1E2530ff)
    font_color = rgba(ffffffff)
    font_family = SF Pro Text
    fade_on_empty = true
    placeholder_text = <span foreground="##6B7280">contraseña...</span>
    hide_input = false
    check_color = rgba(539AFCff)
    fail_color = rgba(ff5555ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(f1fa8cff)
    position = 0, -60
    halign = center
    valign = center
}
